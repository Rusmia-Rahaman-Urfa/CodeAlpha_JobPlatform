<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevHire | Premium Job Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .gradient-text {
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .job-card:hover { transform: translateY(-4px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 leading-relaxed">

    <nav class="sticky top-0 z-50 glass border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="showJobs()">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
                    <span class="text-white font-black text-xl">D</span>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tight text-slate-800">Dev<span class="text-blue-600">Hire</span></h1>
            </div>
            
            <div class="hidden md:flex items-center gap-8 text-sm font-semibold text-slate-600">
                <a href="#" onclick="showJobs()" class="hover:text-blue-600 transition">Find Jobs</a>
                <a href="#" onclick="showCompanies()" class="hover:text-blue-600 transition">Companies</a>
                <a href="#" class="hover:text-blue-600 transition">Salaries</a>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="document.getElementById('postModal').classList.remove('hidden')" 
                    class="bg-slate-900 text-white px-6 py-2.5 rounded-full font-bold hover:bg-slate-800 transition shadow-xl shadow-slate-200 active:scale-95">
                    Post Opportunity
                </button>
            </div>
        </div>
    </nav>

    <header id="mainHeader" class="relative overflow-hidden pt-20 pb-32">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full -z-10 opacity-30">
            <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-400 rounded-full blur-[120px]"></div>
            <div class="absolute bottom-[10%] right-[-10%] w-[40%] h-[40%] bg-purple-400 rounded-full blur-[120px]"></div>
        </div>

        <div class="max-w-4xl mx-auto px-6 text-center animate__animated animate__fadeInUp">
            <span class="inline-block px-4 py-1.5 mb-6 text-xs font-bold tracking-widest uppercase bg-blue-50 text-blue-600 rounded-full border border-blue-100">
                🚀 Trusted by 500+ Startups
            </span>
            <h2 class="text-5xl md:text-6xl font-black text-slate-900 mb-8 tracking-tight leading-tight">
                Design your career, <br/>
                <span class="gradient-text">engineer your future.</span>
            </h2>
            
            <div class="relative group max-w-2xl mx-auto">
                <input id="searchInput" type="text" 
                    placeholder="Search by job title or keyword..." 
                    class="w-full pl-14 pr-6 py-5 rounded-2xl glass shadow-2xl shadow-blue-100 outline-none focus:ring-4 focus:ring-blue-100 border-slate-200 transition-all text-lg">
                <svg class="absolute left-5 top-5 h-6 w-6 text-slate-400 group-focus-within:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
        </div>
    </header>

    <main id="jobMain" class="max-w-5xl mx-auto pb-24 px-6">
        <div class="flex items-center justify-between mb-10">
            <h3 class="text-xl font-bold text-slate-800">Latest Openings</h3>
            <div class="flex gap-2">
                <span class="px-3 py-1 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-500">Sorted by: Newest</span>
            </div>
        </div>

        <div id="jobList" class="grid gap-6">
            <div class="animate-pulse flex space-x-4 p-8 bg-white rounded-3xl border border-slate-100">
                <div class="rounded-full bg-slate-200 h-12 w-12"></div>
                <div class="flex-1 space-y-6 py-1">
                    <div class="h-2 bg-slate-200 rounded"></div>
                    <div class="grid grid-cols-3 gap-4">
                        <div class="h-2 bg-slate-200 rounded col-span-2"></div>
                        <div class="h-2 bg-slate-200 rounded col-span-1"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <section id="companySection" class="hidden max-w-5xl mx-auto py-24 px-6">
        <div class="text-center mb-16">
            <h3 class="text-4xl font-black text-slate-900 mb-4">Featured Companies</h3>
            <p class="text-slate-500">Explore top-tier organizations hiring now.</p>
        </div>
        <div id="companyList" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            </div>
    </section>

    <div id="postModal" class="hidden fixed inset-0 z-[100] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-6 animate__animated animate__fadeIn">
        <div class="bg-white w-full max-w-xl rounded-[2rem] p-10 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-600 to-purple-600"></div>
            <h3 class="text-3xl font-black mb-2 text-slate-900">Post an Opening</h3>
            <form id="jobForm" class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Job Title</label>
                        <input type="text" name="title" placeholder="e.g. Backend Lead" class="w-full border border-slate-200 p-3.5 rounded-xl outline-none focus:border-blue-500 bg-slate-50" required>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Company</label>
                        <input type="text" name="company" placeholder="e.g. Google" class="w-full border border-slate-200 p-3.5 rounded-xl outline-none focus:border-blue-500 bg-slate-50" required>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Location</label>
                    <input type="text" name="location" placeholder="e.g. Remote" class="w-full border border-slate-200 p-3.5 rounded-xl outline-none focus:border-blue-500 bg-slate-50" required>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Description</label>
                    <textarea name="description" placeholder="Describe the role..." class="w-full border border-slate-200 p-3.5 rounded-xl outline-none focus:border-blue-500 bg-slate-50 h-32" required></textarea>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-4 rounded-xl font-black shadow-lg hover:bg-blue-700 transition">Publish Job</button>
                    <button type="button" onclick="document.getElementById('postModal').classList.add('hidden')" class="flex-1 bg-slate-100 text-slate-600 py-4 rounded-xl font-bold">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="detailModal" class="hidden fixed inset-0 z-[110] bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-2xl rounded-[2.5rem] p-10 shadow-2xl relative max-h-[90vh] overflow-y-auto">
            <button onclick="closeDetailModal()" class="absolute top-6 right-6 text-slate-400 hover:text-slate-600">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
            <div id="detailContent"></div>
        </div>
    </div>

    <div id="applyModal" class="hidden fixed inset-0 z-[120] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-lg rounded-[2rem] p-10 shadow-2xl">
            <h3 id="applyJobTitle" class="text-2xl font-black mb-2 text-slate-900">Apply for Position</h3>
            <form id="applyForm" class="space-y-4">
                <input type="hidden" id="applyJobId" name="jobId">
                <input type="text" name="candidateName" placeholder="Full Name" class="w-full border border-slate-200 p-4 rounded-xl bg-slate-50" required>
                <input type="email" name="candidateEmail" placeholder="Email Address" class="w-full border border-slate-200 p-4 rounded-xl bg-slate-50" required>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Resume (PDF)</label>
                    <input type="file" name="resume" accept=".pdf" class="w-full bg-slate-50 p-4 rounded-xl border-2 border-dashed border-slate-200" required>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="submit" class="flex-1 bg-green-600 text-white py-4 rounded-xl font-black hover:bg-green-700 transition">Send Application</button>
                    <button type="button" onclick="document.getElementById('applyModal').classList.add('hidden')" class="flex-1 bg-slate-100 text-slate-600 py-4 rounded-xl font-bold">Close</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
